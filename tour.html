<!DOCTYPE html>
<html lang="vi">
<head>
	<title>Tour 360 Generated by Solia</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
	<meta name="mobile-web-app-capable" content="yes" />
	<meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
	<meta http-equiv="x-ua-compatible" content="IE=edge" />

	<!-- CSS Stylesheets -->
	<link rel="stylesheet" href="css/theme.css">
	<link rel="stylesheet" href="css/animation.css">
	<link rel="stylesheet" href="css/ui.css">
	<link rel="stylesheet" href="css/components.css">

	<!-- UI Scripts (Pre-loaded in head to ensure window.SoliaUI is defined before Krpano onready triggers) -->
	<script src="js/config.js"></script>
	<script src="js/menu.js"></script>
	<script src="js/toolbar.js"></script>
	<script src="js/hotspot.js"></script>
	<script src="js/transition.js"></script>
	<script src="js/ui.js"></script>

	<style>
		html { height: 100%; }
		body { 
			height: 100%; 
			overflow: hidden; 
			margin: 0; 
			padding: 0; 
			background-color: #0c0600; 
		}
		#pano {
			width: 100%;
			height: 100%;
			position: absolute;
			top: 0;
			left: 0;
			z-index: 1;
		}
	</style>
</head>
<body>

	<!-- Krpano Viewer Engine -->
	<script src="tour.js"></script>

	<div id="pano">
		<noscript>
			<table style="width:100%;height:100%;">
				<tr style="vertical-align:middle;">
					<td>
						<div style="text-align:center; color:#fff; font-family:sans-serif;">
							ERROR:<br/><br/>Javascript not activated<br/><br/>
						</div>
					</td>
				</tr>
			</table>
		</noscript>
		<script>
			embedpano({
				xml: "tour.xml", 
				target: "pano", 
				html5: "only", 
				mobilescale: 1.0, 
				passQueryParameters: "startscene,startlookat",
				onready: function(krpano_instance) {
					// Connect krpano engine to the UI Orchestrator
					window.SoliaUI.setKrpano(krpano_instance);
				}
			});
		</script>
	</div>

</body>
</html>
