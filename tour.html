<!DOCTYPE html>
<html lang="vi">
<head>
	<title>Tour 360 Generated by Solia</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
	<meta name="mobile-web-app-capable" content="yes" />
	<meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
	<meta http-equiv="x-ua-compatible" content="IE=edge" />

	<!-- CSS Stylesheets (Absolute paths to prevent resolution issues on custom routes like /tour) -->
	<link rel="stylesheet" href="/css/theme.css">
	<link rel="stylesheet" href="/css/animation.css">
	<link rel="stylesheet" href="/css/ui.css">
	<link rel="stylesheet" href="/css/components.css">

	<!-- UI Scripts (Absolute paths to prevent resolution issues on custom routes like /tour) -->
	<script src="/js/config.js"></script>
	<script src="/js/menu.js"></script>
	<script src="/js/toolbar.js"></script>
	<script src="/js/hotspot.js"></script>
	<script src="/js/transition.js"></script>
	<script src="/js/ui.js"></script>

	<!-- Global error boundary: catch any uncaught JS error to prevent loading screen freeze -->
	<script>
		function forceRemoveLoader() {
			setTimeout(function() {
				var loader = document.getElementById('solia-loading-screen');
				if (loader) {
					console.warn('[Solia] Forcing loading screen removal due to JS error.');
					loader.remove();
				}
			}, 3000);
		}
		window.addEventListener('error', function(e) {
			console.error('[Solia] Uncaught error:', e.message, 'at', e.filename + ':' + e.lineno);
			forceRemoveLoader();
		});
		window.addEventListener('unhandledrejection', function(e) {
			console.error('[Solia] Unhandled promise rejection:', e.reason);
			forceRemoveLoader();
		});

		// Safe wrapper for krpano XML callbacks to prevent crash if called early
		window.SoliaUI_onSceneChange = function(sceneName) {
			if (window.SoliaUI && typeof window.SoliaUI.onSceneChange === 'function') {
				window.SoliaUI.onSceneChange(sceneName);
			} else {
				console.warn('[Solia] SoliaUI.onSceneChange called but SoliaUI is not ready yet.');
			}
		};
	</script>

	<style>
		html { height: 100%; }
		body { 
			height: 100%; 
			overflow: hidden; 
			margin: 0; 
			padding: 0; 
			background-color: #0c0600; 
		}
		#pano {
			width: 100%;
			height: 100%;
			position: absolute;
			top: 0;
			left: 0;
			z-index: 1;
		}
	</style>
</head>
<body>

	<!-- Krpano Viewer Engine -->
	<script src="/tour.js"></script>

	<div id="pano">
		<noscript>
			<table style="width:100%;height:100%;">
				<tr style="vertical-align:middle;">
					<td>
						<div style="text-align:center; color:#fff; font-family:sans-serif;">
							ERROR:<br/><br/>Javascript not activated<br/><br/>
						</div>
					</td>
				</tr>
			</table>
		</noscript>
		<script>
			embedpano({
				xml: "/tour.xml", 
				target: "pano", 
				html5: "only", 
				mobilescale: 1.0, 
				passQueryParameters: "startscene,startlookat",
				onready: function(krpano_instance) {
					// Guard clause: verify SoliaUI is initialized before calling setKrpano.
					// Protects against race conditions or script load failures.
					if (window.SoliaUI && typeof window.SoliaUI.setKrpano === 'function') {
						window.SoliaUI.setKrpano(krpano_instance);
					} else {
						console.warn('[Solia] SoliaUI chưa sẵn sàng khi krpano onready fire. SoliaUI =', window.SoliaUI);
						// Fallback: hide loading screen so tour is not frozen for the user
						setTimeout(function() {
							var loader = document.getElementById('solia-loading-screen');
							if (loader) loader.remove();
						}, 500);
					}
				}
			});
		</script>
	</div>

</body>
</html>
